<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال البيانات إلى البوت الجديد</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0088cc; /* لون التليجرام */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #006699;
        }
        .status-message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>إدخال البيانات</h2>
    <form id="telegramForm">
        <div class="form-group">
            <label for="fullName">اسمك الكامل:</label>
            <input type="text" id="fullName" placeholder="أدخل اسمك الكامل هنا" required>
        </div>
        <div class="form-group">
            <label for="cityName">إسم المدينة التي تسكن فيها:</label>
            <input type="text" id="cityName" placeholder="أدخل اسم مدينتك هنا" required>
        </div>
        <button type="submit">إرسال البيانات</button>
    </form>
    <div id="status" class="status-message"></div>
</div>

<script>
    document.getElementById('telegramForm').addEventListener('submit', function(e) {
        e.preventDefault(); // منع الصفحة من إعادة التحميل

        // البيانات المستخرجة من صورك الخاصة بالبوت الجديد
        const BOT_TOKEN = "8912060160:AAEBENnMxuxL10SMT2TOlpQewpDPCW208bw"; 
        const CHAT_ID = "8608140669"; 

        // جلب المدخلات
        const fullName = document.getElementById('fullName').value;
        const cityName = document.getElementById('cityName').value;
        const statusDiv = document.getElementById('status');

        // تجهيز نص رسالة التليجرام بشكل منظم ومقروء
        const textMessage = `📌 تم استقبال بيانات جديدة:\n\n👤 الاسم الكامل: ${fullName}\n🏙️ المدينة: ${cityName}`;

        // رابط الإرسال المباشر لـ API التليجرام
        const telegramUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

        statusDiv.style.color = "blue";
        statusDiv.textContent = "جاري إرسال البيانات...";

        // إرسال الطلب بشكل منظم وسريع
        fetch(telegramUrl, {
            method: 'POST',
            headers: {
                'Accept': 'application/json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: textMessage,
                parse_mode: 'HTML' // تتيح لك إرسال نصوص منسقة إن أردت لاحقاً
            })
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('شبكة التليجرام رفضت الطلب أو التوكن غير مفعل.');
            }
            return response.json();
        })
        .then(data => {
            if (data.ok) {
                statusDiv.style.color = "green";
                statusDiv.textContent = "تم إرسال معلوماتك بنجاح فوراً!";
                document.getElementById('telegramForm').reset(); // تفريغ الخانات للمستخدم القادم
            } else {
                statusDiv.style.color = "red";
                statusDiv.textContent = "فشل الإرسال. تأكد من تفعيل البوت بالضغط على Start.";
            }
        })
        .catch(error => {
            statusDiv.style.color = "red";
            statusDiv.textContent = "حدث خطأ في الاتصال. تأكد من إنترنت جهازك.";
            console.error('Error:', error);
        });
    });
</script>

</body>
</html>
